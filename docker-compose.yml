# OSRM self-hosted (Chiapas) para ViajeSeguro.
# Dos servicios sobre un volumen compartido:
#   - osrm-prepare: descarga México y lo recorta a la región con osmium (base Debian moderna).
#                   Corre una vez y termina.
#   - osrm: preprocesa (extract/partition/customize) si hace falta y sirve osrm-routed en :5000.
# El puerto 5000 NO se publica al host: el backend lo consume por la red interna
# (OSRM_URL=http://osrm:5000). Para probar en local, descomenta el bloque `ports` del servicio osrm.
services:
  osrm-prepare:
    build:
      context: .
      dockerfile: Dockerfile.prepare
    image: viajeseguro-osrm-prepare:latest
    restart: "no"
    environment:
      GEOFABRIK_URL: ${GEOFABRIK_URL:-https://download.geofabrik.de/north-america/mexico-latest.osm.pbf}
      BBOX: ${BBOX:--94.2,14.5,-90.3,17.99}
      OSRM_NAME: ${OSRM_NAME:-chiapas}
      FORCE_REBUILD: ${FORCE_REBUILD:-false}
      KEEP_SOURCE_PBF: ${KEEP_SOURCE_PBF:-false}
    volumes:
      - osrm-data:/data

  osrm:
    build:
      context: .
      dockerfile: Dockerfile
    image: viajeseguro-osrm:chiapas
    container_name: osrm
    restart: unless-stopped
    depends_on:
      - osrm-prepare
    environment:
      PROFILE: ${PROFILE:-/opt/car.lua}
      OSRM_NAME: ${OSRM_NAME:-chiapas}
      FORCE_REBUILD: ${FORCE_REBUILD:-false}
    volumes:
      - osrm-data:/data
    expose:
      - "5000"
    # Solo para pruebas locales desde el host (NO en producción/Coolify):
    # ports:
    #   - "5000:5000"

volumes:
  osrm-data:
